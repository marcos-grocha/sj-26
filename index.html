<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>São João 2026 — Programação</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --accent: #e8a020;
      --accent2: #c46a1f;
      --text: #f0f0f0;
      --muted: #888;
      --tag-bg: #2a2a2a;
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--accent);
    }

    header p.subtitle {
      margin-top: 0.3rem;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── COUNTDOWN ── */
    .countdown-wrap {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.2rem;
    }

    .countdown-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-num {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--accent);
      min-width: 2.8ch;
      text-align: center;
    }

    .countdown-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .countdown-sep {
      font-size: 1.8rem;
      color: var(--border);
      align-self: flex-start;
      padding-top: 0.15rem;
      font-weight: 300;
    }

    /* ── WEEK FILTER ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* ── WEEK SECTION ── */
    .week-section {
      margin-bottom: 2.5rem;
    }

    .week-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.8rem;
      padding-left: 0.2rem;
    }

    .week-title span {
      color: var(--accent);
      font-weight: 700;
    }

    /* ── DAY CARD ── */
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 0.6rem;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 0.8rem 1rem;
      transition: border-color 0.15s, transform 0.1s;
      cursor: default;
    }

    .day-card:hover {
      border-color: #3e3e3e;
      transform: translateY(-1px);
    }

    .day-card.today {
      border-color: var(--accent);
      background: #1e1800;
    }

    .day-card.special {
      border-left: 3px solid var(--accent2);
    }

    .day-card.hidden { display: none; }

    /* Date column */
    .day-date {
      text-align: center;
      padding-top: 0.1rem;
    }

    .day-num {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .day-month {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 1px;
    }

    .day-weekday {
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Content column */
    .day-content {}

    .day-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--accent2);
      color: #fff;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .day-artists {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
    }

    .artist-tag {
      font-size: 0.82rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--text);
      line-height: 1.3;
    }

    .artist-tag.headline {
      font-weight: 600;
      border-color: #3a3a3a;
    }

    .palco360 {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }

    .palco360-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .palco360-artist {
      font-size: 0.78rem;
      color: #aaa;
    }

    /* TODAY badge */
    .today-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--accent);
      color: #000;
      margin-bottom: 0.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .day-card {
        grid-template-columns: 60px 1fr;
        gap: 0.6rem 0.8rem;
        padding: 0.8rem 0.9rem;
      }
      .day-num { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>

  <div class="countdown-wrap" id="countdown">
    <div class="countdown-block"><span class="countdown-num" id="cd-d">--</span><span class="countdown-label">dias</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-h">--</span><span class="countdown-label">horas</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-m">--</span><span class="countdown-label">min</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-s">--</span><span class="countdown-label">seg</span></div>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-week="all">Todos</button>
  <button class="filter-btn" data-week="1">S1 · O Abre-Alas</button>

  <button class="filter-btn" data-week="5">S5 · São João & São Pedro</button>
</div>

<main id="schedule"></main>

<footer>
  São João de Aracaju 2026 · Programação sujeita a alterações
  <br><br>

</footer>

        artists: ["Pedro Lua", "Elba Ramalho", "Flávio José", "Mestrinho"],
        p360: "Forró Cana com Limão" },
    ]
  }
];

// ── Render ──
const today = new Date();
const todayStr = today.toISOString().slice(0, 10);

function dayNum(dateStr) { return parseInt(dateStr.split("-")[2]); }

function renderSchedule() {
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  WEEKS.forEach(week => {
    const section = document.createElement("section");
    section.className = "week-section";
    section.dataset.week = week.id;

    const title = document.createElement("p");
    title.className = "week-title";
    title.innerHTML = `<span>${week.title.split("·")[0]}</span>·${week.title.split("·")[1]}`;
    section.appendChild(title);

    week.days.forEach(day => {
      const isToday = day.date === todayStr;
      const isPast = day.date < todayStr;

      const card = document.createElement("div");
      card.className = "day-card" +
        (isToday ? " today" : "") +
        (day.special ? " special" : "");
      card.dataset.week = week.id;

      // Headline = last artist listed
      const headline = day.artists[day.artists.length - 1];

      card.innerHTML = `
        <div class="day-date">
          <div class="day-num">${dayNum(day.date)}</div>
          <div class="day-month">${day.month}</div>
          <div class="day-weekday">${day.weekday}</div>
        </div>
        <div class="day-content">
          ${isToday ? '<span class="today-badge">● Hoje</span>' : ""}
          ${day.special ? `<span class="day-badge">${day.special}</span>` : ""}
          <div class="day-artists">
            ${day.artists.map((a, i) =>
              `<span class="artist-tag${i === day.artists.length - 1 ? " headline" : ""}">${a}</span>`
            ).join("")}
          </div>
          <div class="palco360">
            <span class="palco360-label">Palco 360°</span>
            <span class="palco360-artist">${day.p360}</span>
          </div>
        </div>
      `;

      section.appendChild(card);
    });

    container.appendChild(section);
  });
}

// ── Filter ──
document.getElementById("filterBar").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;

  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  const week = btn.dataset.week;
  document.querySelectorAll(".week-section").forEach(s => {
    s.style.display = (week === "all" || s.dataset.week === week) ? "" : "none";
  });
});

// ── Countdown ──
const EVENT_START = new Date("2026-05-29T18:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = EVENT_START - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML =
      '<p style="color:var(--accent);font-weight:700;font-size:1rem;padding:0.5rem 0">O São João começou! 🎉</p>';
    return;
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById("cd-d").textContent = String(d).padStart(2, "0");
  document.getElementById("cd-h").textContent = String(h).padStart(2, "0");
  document.getElementById("cd-m").textContent = String(m).padStart(2, "0");
  document.getElementById("cd-s").textContent = String(s).padStart(2, "0");
}

renderSchedule();
updateCountdown();
setInterval(updateCountdown, 1000);

// Auto-scroll to today
const todayCard = document.querySelector(".day-card.today");
if (todayCard) {
  setTimeout(() => todayCard.scrollIntoView({ behavior: "smooth", block: "center" }), 300);
}
