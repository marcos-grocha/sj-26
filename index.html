<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>São João 2026 — Programação</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header id="site-header">
  <div class="header-flags" id="header-flags" aria-hidden="true"></div>

  <div class="header-main-row">
    <h1>São João 2026</h1>
    <div class="countdown-compact" id="countdown-compact" aria-hidden="true"></div>
  </div>

  <p class="subtitle">Aracaju · Programação Oficial</p>

  <div class="countdown-wrap" id="countdown">
    <div class="countdown-block"><span class="countdown-num" id="cd-d">--</span><span class="countdown-label">dias</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-h">--</span><span class="countdown-label">horas</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-m">--</span><span class="countdown-label">min</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-s">--</span><span class="countdown-label">seg</span></div>
  </div>

  <div class="header-credit">
    Desenvolvido por <a href="https://www.instagram.com/marcosjrgm/" target="_blank" rel="noopener noreferrer">@marcosjrgm</a>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-week="all">Todos</button>
  <button class="filter-btn" data-week="1">S1 · Final de Maio</button>
  <button class="filter-btn" data-week="2">S2 · Início de Junho</button>
  <button class="filter-btn" data-week="3">S3 · Namorados & St. Antônio</button>
  <button class="filter-btn" data-week="4">S4 · Reta Final</button>
  <button class="filter-btn" data-week="5">S5 · São João & São Pedro</button>
</div>

<main id="schedule"></main>

<footer>
  São João de Aracaju 2026
  <br><br>
  Desenvolvido por <a href="https://www.instagram.com/marcosjrgm/" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:none;font-weight:600;">@marcosjrgm</a>
</footer>

<script src="script.js"></script>
</body>
</html>
