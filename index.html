<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>São João Aracaju 2026 — Programação</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-arraia">

<header id="site-header">
  <div class="header-flags" id="header-flags" aria-hidden="true"></div>

  <div class="header-main-row">
    <h1 id="festival-title">Arraiá do Povo</h1>
    <div class="countdown-compact" id="countdown-compact" aria-hidden="true"></div>
  </div>

  <p class="subtitle" id="festival-subtitle">Aracaju · Programação Oficial</p>

  <div class="countdown-wrap" id="countdown">
    <div class="countdown-block"><span class="countdown-num" id="cd-d">--</span><span class="countdown-label">dias</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-h">--</span><span class="countdown-label">horas</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-m">--</span><span class="countdown-label">min</span></div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block"><span class="countdown-num" id="cd-s">--</span><span class="countdown-label">seg</span></div>
  </div>

  <div class="header-credit">2026</div>
</header>

<div class="filter-bar" id="filterBar"></div>

<main id="schedule"></main>

<footer>
  São João • 2026 • Aracaju
  <br><br>
  Desenvolvido por <a href="https://www.instagram.com/marcosjrgm/" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:none;font-weight:600;">@marcosjrgm</a>
</footer>

<div id="map-button" class="map-button" role="button" tabindex="0" title="Mapa do evento" aria-label="Mapa do evento"></div>

<div id="map-popup" class="map-popup" role="dialog" aria-label="Mapa do evento">
  <button class="map-popup__close" id="map-popup-close" aria-label="Fechar">×</button>
  <p class="map-popup__text">
    Em breve: Mapa 3D do
    <span class="map-popup__name" id="map-popup-name">evento</span>
  </p>
</div>

<div id="contact-bubble" class="contact-bubble" title="Sugestões? Fale comigo!" aria-label="Contato"></div>

<div id="festival-toggle" class="festival-toggle" role="button" tabindex="0" aria-label="Alternar festa"></div>

<div id="festival-popup" class="festival-popup" role="dialog" aria-label="Alternar festa">
  <button class="festival-popup__close" id="festival-popup-close" aria-label="Fechar">×</button>
  <p class="festival-popup__text">
    Confira também:
    <span class="festival-popup__name" id="festival-popup-name">Forró Caju</span>!
  </p>
</div>

<div id="festival-curtain" class="festival-curtain" aria-hidden="true">
  <div class="curtain-rope"></div>
  <div class="curtain-flags"></div>
</div>

<div id="festival-bonfire" class="festival-bonfire" aria-hidden="true">
  <div class="bonfire-darken"></div>
  <div class="bonfire-orla">
    <svg class="orla-silhouette" viewBox="0 0 400 150" preserveAspectRatio="xMidYEnd meet" xmlns="http://www.w3.org/2000/svg">
      <g class="orla-arch" style="--i:0">
        <path fill-rule="evenodd" d="M 0 150 L 0 80 Q 0 50 40 50 Q 80 50 80 80 L 80 150 Z M 14 150 L 14 85 Q 14 64 40 64 Q 66 64 66 85 L 66 150 Z"/>
      </g>
      <g class="orla-arch" style="--i:1">
        <path fill-rule="evenodd" d="M 80 150 L 80 50 Q 80 10 140 10 Q 200 10 200 50 L 200 150 Z M 98 150 L 98 55 Q 98 26 140 26 Q 182 26 182 55 L 182 150 Z"/>
      </g>
      <g class="orla-arch" style="--i:2">
        <path fill-rule="evenodd" d="M 200 150 L 200 50 Q 200 10 260 10 Q 320 10 320 50 L 320 150 Z M 218 150 L 218 55 Q 218 26 260 26 Q 302 26 302 55 L 302 150 Z"/>
      </g>
      <g class="orla-arch" style="--i:3">
        <path fill-rule="evenodd" d="M 320 150 L 320 80 Q 320 50 360 50 Q 400 50 400 80 L 400 150 Z M 334 150 L 334 85 Q 334 64 360 64 Q 386 64 386 85 L 386 150 Z"/>
      </g>
    </svg>
  </div>
  <div class="bonfire-glow"></div>
  <div class="bonfire-flames">
    <span class="flame"></span>
    <span class="flame"></span>
    <span class="flame"></span>
    <span class="flame"></span>
    <span class="flame"></span>
  </div>
  <div class="bonfire-logs">
    <span class="log log-back"></span>
    <span class="log log-left"></span>
    <span class="log log-right"></span>
    <span class="log log-front"></span>
    <span class="ember ember-1"></span>
    <span class="ember ember-2"></span>
    <span class="ember ember-3"></span>
  </div>
  <div class="bonfire-sparks"></div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
